variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

.test_template:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.14-trixie-slim
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .cache/uv
  before_script:
    - uv sync --frozen
  rules:
    - if: $CI_COMMIT_BRANCH

stages:
  - test

test_ruff:
  extends: .test_template
  script:
    - uv run ruff check .
    - uv run ruff format --check

test_django:
  extends: .test_template
  variables:
    POSTGRES_DB: "db"
    DB_NAME: "db"
    POSTGRES_USER: "dbuser"
    DB_USER: "dbuser"
    POSTGRES_PASSWORD: "dbpass"
    DB_PASSWORD: "dbpass"
    DB_HOST: "postgresdb"
    DB_PORT: "5432"
    RPC_URL: "https://coston-api.flare.network/ext/bc/C/rpc"
  services:
    - name: postgres:18
      alias: postgresdb
  script:
    - uv run pytest --cov --cov-report=xml:coverage.xml --junit-xml=junit.xml .
  coverage: /TOTAL\s+\d+\s+\d+\s+(\d+)%$/
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml