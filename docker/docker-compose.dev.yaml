x-django: &django
  user: "root"
  build:
    context: ../
    dockerfile: Dockerfile
    args:
      DEV: "true"
  env_file:
    - ../.env

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # uncomment if you need to connect to db outside of docker, eg: pgadmin
    # ports:
    #   - "127.0.0.1:${DB_PROXY_PORT}:5432"
    # uncomment to persist db data between downs
    # volumes:
    #  - ./db-data/:/var/lib/postgresql
    # uncomment for query logging
    # command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]

  django:
    <<: *django
    entrypoint: ["/app/docker/entrypoint-local.sh"]
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "${SERVER_PROXY_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../:/app
    # uncomment if healthcheck is needed
    # healthcheck:
    #   test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
